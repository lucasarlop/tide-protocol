name: CI

on:
  push:
    branches: [main, experiment/tide-core]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: python -m pip install -q -e . pytest
      - run: pytest -q --tb=short > /tmp/pytest.log 2>&1 || { tail -n 160 /tmp/pytest.log; exit 1; }
      - run: tide setup --codex --opencode --dry-run
