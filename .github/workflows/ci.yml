name: CI

on:
  push:
    branches: [main, refactor/tide-consolidation]
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ['3.12']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -e . pytest
      - run: pytest
      - run: tide setup --codex --opencode --dry-run
