name: CI

on:
  push:
    branches: [main, experiment/tide-core]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Quiet diagnostic checkout
        run: git clone -q --depth 1 --branch "$GITHUB_HEAD_REF" https://github.com/$GITHUB_REPOSITORY.git repo
      - name: Install
        run: cd repo && python -m pip install -q -e . pytest
      - name: Test
        run: cd repo && pytest -q --tb=short > /tmp/pytest.log 2>&1 || { tail -n 80 /tmp/pytest.log; exit 1; }
