name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Check Tide CLI syntax
        run: python3 -m py_compile bin/tide
      - name: Run tests
        run: python3 -m unittest discover -s tests -v
      - name: Installer dry-run
        run: bash install.sh --dry-run
